<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
</head>
<body>
    <div id="title"><h1>Task Manager</h1></div>

    <div id="createTaskContainer">
        <input type="text" name="" id="textBox" placeholder="Enter Task">
        <button id="createTaskButton">Create Task</button>
    </div>

    <div><h2 id="TasksHeader">Tasks</h2></div>

    <div id="taskContainers">
        <div>
            <h3 id="taskTitle">Test task</h3>
            <p id="statusParagraph">Status: <span id="status">todo</span></p>
            <button id="delete">delete</button>
            <button id="markInProgress">mark as in progress</button>
            <button id="markDone">Mark as done</button>
        </div>
    </div>

</body>
</html>
